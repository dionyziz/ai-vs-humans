<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0d0d0d"/>

  <!-- Machine side (left, red) — stylised circuit node -->
  <circle cx="9" cy="16" r="5" fill="none" stroke="#cc2200" stroke-width="1.5"/>
  <line x1="9" y1="11" x2="9" y2="8"  stroke="#cc2200" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="21" x2="9" y2="24" stroke="#cc2200" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="1"  y2="16" stroke="#cc2200" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="16" x2="14.5" y2="16" stroke="#cc2200" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="9" cy="16" r="2" fill="#cc2200"/>

  <!-- Gold spine -->
  <line x1="16" y1="2" x2="16" y2="30" stroke="#ffd700" stroke-width="1.5"/>

  <!-- Human side (right, blue) — stylised figure -->
  <circle cx="23" cy="10" r="2.5" fill="#1a66cc"/>
  <line x1="23" y1="12.5" x2="23" y2="20" stroke="#1a66cc" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="15" x2="27" y2="15" stroke="#1a66cc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="19.5" y2="25" stroke="#1a66cc" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="20" x2="26.5" y2="25" stroke="#1a66cc" stroke-width="1.5" stroke-linecap="round"/>
</svg>
